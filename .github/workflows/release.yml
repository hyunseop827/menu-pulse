name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: bash -n Scripts/*.sh

      - name: Check compiler
        run: xcrun clang --version

      - name: Check tag matches Info.plist version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Packaging/Info.plist)"
          test "$TAG_VERSION" = "$PLIST_VERSION"

      - name: Build DMG
        run: |
          chmod +x Scripts/*.sh
          Scripts/build-dmg.sh

      - name: Verify app and DMG
        run: |
          codesign --verify --strict "build/release/Menu Pulse.app"
          hdiutil verify dist/MenuPulse.dmg
          file "build/release/Menu Pulse.app/Contents/MacOS/MenuPulse"
          otool -L "build/release/Menu Pulse.app/Contents/MacOS/MenuPulse"
          ! otool -L "build/release/Menu Pulse.app/Contents/MacOS/MenuPulse" | grep -q '/usr/lib/swift'

      - name: Create checksum
        run: |
          shasum -a 256 dist/MenuPulse.dmg > SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/MenuPulse.dmg \
            SHA256SUMS.txt \
            --title "$GITHUB_REF_NAME" \
            --notes "Apple Silicon arm64 build. Ad-hoc signed, not notarized; macOS Gatekeeper may show a warning on first launch."
